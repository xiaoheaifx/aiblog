name = "xiaohe-ai-share"
compatibility_date = "2024-01-01"
pages_build_output_dir = "./dist"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "blog"
database_id = "YOUR_DATABASE_ID_HERE"

# Environment variables (ADMIN_PASS should be set in Cloudflare Dashboard)
[vars]
ADMIN_PASS = ""
